<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>hello JSS</title>
</head>
<body>
    <h2>Java Script class</h2>
    <script>
//variable declaration in JS using var keyword

var myName = "ABESEC";
document.write(myName);

    var abc="demo";
    console.log(abc);
}
hello();
var myName="AKTU";
console.log(myName);

//JS execution using let and const keyword
let msg = "Welcome to JSS";
console.log(msg);

msg ="thanks for visiting!";
console.log(msg);
    </script> 
</body>
