<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>objects in JS</title>
</head>
<body>
    <script>
    //object - it is the collection(pair) of keys(property) and its value.

    //create object - literal {} and new keyword

    //create object for student

    let student={
        id:101,
        name:"Abhay",
        age:23,
        isMarried:false,

        address:{
            streetNo:2,
            area:"Pratap Vihar",
            pincode:20109,
            city:"Ghaziabad",
        },
         education:["B.Tech","CSE",18,2025],
         getinfo:function(){
               return "My details are " + this.name;
  
         },
         examDone:null
         
    };
    student.getinfo();
    //console.log(student);
    //console.log(typeof(student));

    //acess object's properties/keys
    console.log(student.getinfo());

    //find object's keys in object
    console.log('id' in student);
    //delete object's keys from object
    console.log(delete student.name);
    console.log(student);
    
    //object length
    let StudentKeys=Object.keys(student);
    console.log(StudentKeys.length);

    //iterate keys of object

    //using for----loop
    for(let i = 0; i < StudentKeys.length; i++){
   console.log(student[StudentKeys[i]]);
}

    //for in loop
    for(let x in student){
        console.log(student[x]);
    }

    //create an object using new keyword

    let myInfo=new Object();
    myInfo.name="Vikas";
    myInfo.age=23;
    myInfo.city="Delhi";
    myInfo.isMarried="true"
    </script>
</body>
</html>
